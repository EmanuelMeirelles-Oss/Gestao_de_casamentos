<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestão de Noivos — Casamentos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-content">
      <h1>Gestão de Casamentos</h1>
      <span class="header-sub">Painel de Controle</span>
    </div>
    <nav class="main-nav">
      <a href="index.html">Fornecedores</a>
      <a href="noivos.html" class="active">Noivos</a>
      <a href="eventos.html">Eventos</a>
    </nav>
  </header>

  <main>
    <section class="card">
      <h2 id="titulo-form">Cadastrar Noivos</h2>
      <div id="mensagem" class="mensagem" role="alert"></div>

      <form id="form-noivos" novalidate>
        <div class="form-grid">
          <div class="campo">
            <label for="nome_noivo">Nome do Noivo <span class="obrigatorio">*</span></label>
            <input type="text" id="nome_noivo" placeholder="Ex.: João Silva" maxlength="100" required />
          </div>

          <div class="campo">
            <label for="nome_noiva">Nome da Noiva <span class="obrigatorio">*</span></label>
            <input type="text" id="nome_noiva" placeholder="Ex.: Maria Souza" maxlength="100" required />
          </div>

          <div class="campo">
            <label for="email">E-mail <span class="obrigatorio">*</span></label>
            <input type="email" id="email" placeholder="contato@casal.com" maxlength="100" required />
          </div>

          <div class="campo">
            <label for="telefone">Telefone <span class="obrigatorio">*</span></label>
            <input type="text" id="telefone" placeholder="(11) 99999-9999" maxlength="20" required />
          </div>
        </div>

        <div class="form-acoes">
          <button type="submit" id="btn-salvar" class="btn btn-primario">Cadastrar</button>
          <button type="button" id="btn-cancelar" class="btn btn-secundario" style="display:none">Cancelar</button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="lista-header">
        <h2>Casais Cadastrados</h2>
        <span id="total-registros" class="badge">0 casal(is)</span>
      </div>

      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th>Noivo</th>
              <th>Noiva</th>
              <th>E-mail</th>
              <th>Telefone</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbody-noivos">
            <tr>
              <td colspan="5" class="vazio">Carregando...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="mascaras.js"></script>
  <script src="noivos.js"></script>
</body>
</html>
